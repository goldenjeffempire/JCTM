openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: JCTM Digital Sanctuary API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storage
    description: Object storage uploads
  - name: gallery
    description: Photo gallery management
  - name: sermons
    description: Sermon management
  - name: testimonies
    description: Testimony submissions
  - name: events
    description: Event calendar
  - name: giving
    description: Giving and donations
  - name: members
    description: Member directory
  - name: auth
    description: Member authentication
  - name: chat
    description: TempleBots AI chat
  - name: livestream
    description: Live stream status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sermons:
    get:
      operationId: listSermons
      tags: [sermons]
      summary: List sermons
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of sermons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sermon"
    post:
      operationId: syncSermons
      tags: [sermons]
      summary: Sync latest sermons from YouTube
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /sermons/featured:
    get:
      operationId: getFeaturedSermon
      tags: [sermons]
      summary: Get the featured/latest sermon
      responses:
        "200":
          description: Featured sermon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sermon"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sermons/stats:
    get:
      operationId: getSermonStats
      tags: [sermons]
      summary: Get sermon statistics (totals, counts by topic)
      responses:
        "200":
          description: Sermon statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SermonStats"

  /sermons/intro:
    get:
      operationId: getIntroVideos
      tags: [sermons]
      summary: Get intro videos (50–70 min long-form sermons)
      responses:
        "200":
          description: List of intro sermons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sermon"

  /sermons/{id}:
    get:
      operationId: getSermon
      tags: [sermons]
      summary: Get a sermon by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sermon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sermon"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /testimonies:
    get:
      operationId: listTestimonies
      tags: [testimonies]
      summary: List approved testimonies
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: category
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of testimonies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimony"
    post:
      operationId: submitTestimony
      tags: [testimonies]
      summary: Submit a testimony
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonyBody"
      responses:
        "201":
          description: Testimony submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimony"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /testimonies/{id}/like:
    post:
      operationId: likeTestimony
      tags: [testimonies]
      summary: Increment the Amen/Like count on a testimony
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated like count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerMember
      tags: [auth]
      summary: Register a new digital sanctuary member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMemberBody"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginMember
      tags: [auth]
      summary: Login to the digital sanctuary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginMemberBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMemberProfile
      tags: [auth]
      summary: Get current member profile (requires Bearer token)
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List upcoming events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [events]
      summary: Get next 3 upcoming events for homepage
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /giving:
    get:
      operationId: listGivingLogs
      tags: [giving]
      summary: List giving logs (admin)
      responses:
        "200":
          description: List of giving logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GivingLog"
    post:
      operationId: initiateDonation
      tags: [giving]
      summary: Initiate a donation / giving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationRequest"
      responses:
        "200":
          description: Donation initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /giving/stats:
    get:
      operationId: getGivingStats
      tags: [giving]
      summary: Get giving statistics (total received, recent count)
      responses:
        "200":
          description: Giving stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GivingStats"

  /giving/verify/{reference}:
    get:
      operationId: verifyDonation
      tags: [giving]
      summary: Verify a donation payment
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationVerification"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List members
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create or register a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberBody"
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /chat:
    post:
      operationId: chatWithTempleBots
      tags: [chat]
      summary: Send a message to TempleBots AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/stream:
    post:
      operationId: streamChatWithTempleBots
      tags: [chat]
      summary: Stream a message to TempleBots AI via Server-Sent Events
      description: Returns a text/event-stream SSE response. Each event is JSON with either a `delta` string (token chunk), or a final `done` event with `sessionId`, `sources`, and `action`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of AI response tokens
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/knowledge/ingest:
    post:
      operationId: ingestTempleBotsKnowledge
      tags: [chat]
      summary: Trigger re-ingestion of JCTM knowledge base into vector store
      responses:
        "200":
          description: Ingestion triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "503":
          description: Embeddings API unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /livestream/rebroadcast:
    get:
      operationId: getRebroadcastStatus
      tags: [livestream]
      summary: Get the most recent rebroadcast (if available within 3.5 days of broadcast end)
      responses:
        "200":
          description: Rebroadcast availability and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebroadcastStatus"

  /livestream/status:
    get:
      operationId: getLivestreamStatus
      tags: [livestream]
      summary: Get current livestream status
      responses:
        "200":
          description: Livestream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivestreamStatus"
    post:
      operationId: updateLivestreamStatus
      tags: [livestream]
      summary: Update livestream active status (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLivestreamBody"
      responses:
        "200":
          description: Updated livestream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivestreamStatus"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /gallery:
    get:
      operationId: listGalleryImages
      tags: [gallery]
      summary: List gallery images
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: category
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"
    post:
      operationId: createGalleryImage
      tags: [gallery]
      summary: Add an image to the gallery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryImageBody"
      responses:
        "201":
          description: Created gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    patch:
      operationId: updateGalleryImage
      tags: [gallery]
      summary: Update a gallery image's metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGalleryImageBody"
      responses:
        "200":
          description: Updated gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Sermon:
      type: object
      properties:
        id:
          type: integer
        videoId:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: string
        description:
          type: ["string", "null"]
        publishedAt:
          type: string
        viewCount:
          type: ["integer", "null"]
        duration:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isLive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - videoId
        - title
        - thumbnailUrl
        - publishedAt
        - isFeatured
        - isLive
        - createdAt

    SermonStats:
      type: object
      properties:
        total:
          type: integer
        latestDate:
          type: ["string", "null"]
        totalViews:
          type: ["integer", "null"]
      required:
        - total

    SyncResult:
      type: object
      properties:
        synced:
          type: integer
        message:
          type: string
      required:
        - synced
        - message

    Testimony:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        content:
          type: string
        videoUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        approved:
          type: boolean
        likeCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - content
        - approved
        - likeCount
        - createdAt

    CreateTestimonyBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        content:
          type: string
        videoUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
      required:
        - name
        - content

    LikeResponse:
      type: object
      properties:
        likeCount:
          type: integer
      required:
        - likeCount

    RegisterMemberBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: ["string", "null"]
      required:
        - firstName
        - lastName
        - email
        - password

    LoginMemberBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        member:
          $ref: "#/components/schemas/MemberProfile"
        message:
          type: string
      required:
        - token
        - member
        - message

    MemberProfile:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - firstName
        - lastName
        - email
        - createdAt

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        eventType:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - startDate
        - eventType
        - createdAt

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        eventType:
          type: string
        imageUrl:
          type: ["string", "null"]
      required:
        - title
        - startDate
        - eventType

    GivingLog:
      type: object
      properties:
        id:
          type: integer
        donorName:
          type: ["string", "null"]
        donorEmail:
          type: ["string", "null"]
        amount:
          type: number
        currency:
          type: string
        purpose:
          type: ["string", "null"]
        reference:
          type: string
        status:
          type: string
        paymentMethod:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - amount
        - currency
        - reference
        - status
        - createdAt

    DonationRequest:
      type: object
      properties:
        donorName:
          type: string
        donorEmail:
          type: string
        amount:
          type: number
        currency:
          type: string
          default: "NGN"
        purpose:
          type: ["string", "null"]
      required:
        - donorName
        - donorEmail
        - amount

    DonationResponse:
      type: object
      properties:
        reference:
          type: string
        authorizationUrl:
          type: ["string", "null"]
        message:
          type: string
      required:
        - reference
        - message

    DonationVerification:
      type: object
      properties:
        status:
          type: string
        amount:
          type: number
        donorName:
          type: ["string", "null"]
        message:
          type: string
      required:
        - status
        - amount
        - message

    GivingStats:
      type: object
      properties:
        totalAmount:
          type: number
        totalDonations:
          type: integer
        recentCount:
          type: integer
      required:
        - totalAmount
        - totalDonations
        - recentCount

    Member:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        role:
          type: string
        department:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        joinedAt:
          type: string
      required:
        - id
        - firstName
        - lastName
        - role
        - joinedAt

    CreateMemberBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        role:
          type: string
        department:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
      required:
        - firstName
        - lastName
        - role

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatRequest:
      type: object
      properties:
        message:
          type: string
        sessionId:
          type: ["string", "null"]
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: Previous turns in the conversation (last N messages for context)
      required:
        - message

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        sessionId:
          type: string
        sources:
          type: array
          items:
            type: string
      required:
        - reply
        - sessionId

    LivestreamStatus:
      type: object
      properties:
        isLive:
          type: boolean
        isUpcoming:
          type: boolean
        title:
          type: ["string", "null"]
        streamUrl:
          type: ["string", "null"]
        videoId:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
        scheduledStartTime:
          type: ["string", "null"]
      required:
        - isLive
        - isUpcoming

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]
      required:
        - success

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

