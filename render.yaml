services:
  - type: web
    name: jctm-platform
    runtime: node
    region: oregon
    plan: standard

    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --no-frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/jctm-platform run build &&
      pnpm --filter @workspace/api-server run build

    startCommand: pnpm --filter @workspace/api-server run start

    healthCheckPath: /api/health

    scaling:
      minInstances: 1
      maxInstances: 5
      targetMemoryPercent: 80
      targetCPUPercent: 70

    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: /
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /*.html
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"

    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      - key: PORT
        value: 10000

      - key: LOG_LEVEL
        value: info

      - key: REDIS_URL
        fromService:
          type: redis
          name: jctm-redis
          property: connectionString

      # Set this to your Neon PostgreSQL connection string in the Render dashboard
      - key: DATABASE_URL
        sync: false

      - key: YOUTUBE_API_KEY
        sync: false

      - key: PAYSTACK_SECRET_KEY
        sync: false

      # Set OPENAI_API_KEY to your OpenAI key in the Render dashboard
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: jctm-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
