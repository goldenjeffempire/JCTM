services:
  # ─────────────────────────────────────────────
  # JCTM Platform – Web Service (API + SPA)
  # ─────────────────────────────────────────────
  - type: web
    name: jctm-platform
    runtime: node
    region: oregon
    plan: standard

    # ── Runtime ────────────────────────────────
    # Pin to Node 20 LTS — matches the development environment.
    # pnpm is installed by the build command below.
    envVars:
      - key: NODE_VERSION
        value: "20"

      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      - key: LOG_LEVEL
        value: info

      # Render injects PORT=10000 automatically for web services — do not override.

      # Redis — connection string injected automatically from the jctm-redis service
      - key: REDIS_URL
        fromService:
          type: redis
          name: jctm-redis
          property: connectionString

      # ── Secrets: set these in the Render dashboard ──────────────────────────
      # Neon PostgreSQL connection string (required)
      - key: DATABASE_URL
        sync: false

      # YouTube Data API v3 — sermon auto-sync every 30 minutes
      - key: YOUTUBE_API_KEY
        sync: false

      # Paystack secret key — donation / giving portal (NGN)
      - key: PAYSTACK_SECRET_KEY
        sync: false

      # OpenAI API key — TempleBots, Sermon Assistant, devotions
      - key: OPENAI_API_KEY
        sync: false

      # 64-char random hex secret for session cookie signing
      # Generate: openssl rand -hex 32
      - key: SESSION_SECRET
        sync: false

      # Admin JWT signing secret — independent of SESSION_SECRET so rotating
      # one does not invalidate the other.
      # Generate: openssl rand -hex 32
      - key: ADMIN_TOKEN_SECRET
        sync: false

      # Admin role passphrases — plaintext (ADMIN_PASSPHRASE_*) or pre-hashed
      # scrypt value (ADMIN_PASSPHRASE_HASH_*). At least one form per role is
      # required; dev defaults are intentionally disabled in production.
      - key: ADMIN_PASSPHRASE_GALLERY
        sync: false
      - key: ADMIN_PASSPHRASE_SERMON
        sync: false
      - key: ADMIN_PASSPHRASE_LIVESTREAM
        sync: false

      # Web Push VAPID keys — generate with: npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

      # Web Push sender identity (format: mailto:admin@example.com)
      - key: VAPID_SUBJECT
        value: mailto:info@jctm.org.ng

    # ── Build ──────────────────────────────────
    # 1. Install pnpm and all workspace dependencies
    # 2. Build the React/Vite SPA  → artifacts/jctm-platform/dist/public
    # 3. Compile the Express API   → artifacts/api-server/dist/index.mjs
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      NODE_ENV=production PORT=3000 BASE_PATH=/ pnpm --filter @workspace/jctm-platform run build &&
      NODE_ENV=production pnpm --filter @workspace/api-server run build

    # ── Start ──────────────────────────────────
    # Express serves /api/* (REST) and the compiled SPA (catch-all fallback).
    # --enable-source-maps gives readable stack traces in production error logs.
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    # ── Health check ───────────────────────────
    # Probes PostgreSQL on every Render health ping.
    # Returns 200 OK when the DB is reachable, 503 otherwise.
    healthCheckPath: /api/health

    # ── Scaling ────────────────────────────────
    # Altar counter + SSE streams are in-process memory.
    # Keep at 1 instance until Redis pub/sub fan-out is implemented.
    scaling:
      minInstances: 1
      maxInstances: 1

    # ── Static asset caching headers ───────────
    # The Express app already sets granular Cache-Control headers for each asset
    # type in production. These Render-level headers apply as an additional layer
    # for the CDN edge cache only.
    headers:
      # Vite content-hashed bundles — safe to cache at the edge for 1 year
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

      # HTML shell — must always revalidate so deploys take effect immediately
      - path: /
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: "/*.html"
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"

      # API responses must never be cached by the CDN or browser
      - path: /api/*
        name: Cache-Control
        value: "no-store"

  # ─────────────────────────────────────────────
  # Redis — SSE pub/sub fan-out + rate-limit store
  # ─────────────────────────────────────────────
  - type: redis
    name: jctm-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
