services:
  # ─────────────────────────────────────────────
  # JCTM Platform – Web Service (API + SPA)
  # ─────────────────────────────────────────────
  - type: web
    name: jctm-platform
    runtime: node
    region: oregon
    plan: standard

    # ── Build ──────────────────────────────────
    # 1. Pin pnpm, install workspace deps
    # 2. Build the React/Vite SPA (outputs to artifacts/jctm-platform/dist/public)
    # 3. Compile the Express API server (outputs to artifacts/api-server/dist)
    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --no-frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/jctm-platform run build &&
      pnpm --filter @workspace/api-server run build

    # ── Start ──────────────────────────────────
    # Use node directly — avoids depending on pnpm being in PATH at start time.
    # Express serves both the API (/api/*) and the compiled SPA in production.
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    # ── Health check ───────────────────────────
    # Render pings this endpoint to determine instance health.
    # Our handler probes PostgreSQL (+ Redis when REDIS_URL is set) and returns
    # 200 OK when all services are reachable, or 503 Degraded otherwise.
    healthCheckPath: /api/health

    # ── Scaling ────────────────────────────────
    # The altar counter, sermon SSE stream, and livestream state are stored in
    # process memory.  Multiple instances would split SSE connections and show
    # inconsistent worshipper counts across users.  Keep at 1 until Redis
    # pub/sub fan-out is implemented.
    scaling:
      minInstances: 1
      maxInstances: 1

    # ── Static asset caching headers ───────────
    headers:
      # Vite-hashed JS/CSS bundles (filename contains content hash)
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

      # Media & logos uploaded to the public directory
      - path: "/*.jpeg"
        name: Cache-Control
        value: "public, max-age=604800, stale-while-revalidate=86400"
      - path: "/*.jpg"
        name: Cache-Control
        value: "public, max-age=604800, stale-while-revalidate=86400"
      - path: "/*.png"
        name: Cache-Control
        value: "public, max-age=604800, stale-while-revalidate=86400"
      - path: "/*.webp"
        name: Cache-Control
        value: "public, max-age=604800, stale-while-revalidate=86400"
      - path: "/*.svg"
        name: Cache-Control
        value: "public, max-age=604800, stale-while-revalidate=86400"
      - path: "/*.ico"
        name: Cache-Control
        value: "public, max-age=86400"

      # HTML shell – always revalidate so the SPA entry point is fresh
      - path: /
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: "/*.html"
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"

      # API responses must not be cached by intermediaries
      - path: /api/*
        name: Cache-Control
        value: "no-store"

    # ── Environment variables ───────────────────
    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      # Render assigns port 10000 to web service processes automatically.
      - key: PORT
        value: 10000

      - key: LOG_LEVEL
        value: info

      # Redis connection injected automatically from the jctm-redis service below.
      # The app gracefully skips Redis health checks when this is unset.
      - key: REDIS_URL
        fromService:
          type: redis
          name: jctm-redis
          property: connectionString

      # ── Secrets – set these in the Render dashboard ─────────────────────
      # Neon PostgreSQL connection string
      - key: DATABASE_URL
        sync: false

      # YouTube Data API v3 key for sermon syncing
      - key: YOUTUBE_API_KEY
        sync: false

      # Paystack secret key for donation processing
      - key: PAYSTACK_SECRET_KEY
        sync: false

      # OpenAI API key for TempleBots AI assistant
      - key: OPENAI_API_KEY
        sync: false

      # Random 64-char string used to sign session cookies
      # Generate with: openssl rand -hex 32
      - key: SESSION_SECRET
        sync: false

  # ─────────────────────────────────────────────
  # Redis – health-check probing, future SSE
  # pub/sub fan-out and rate-limit counters
  # ─────────────────────────────────────────────
  - type: redis
    name: jctm-redis
    region: oregon
    plan: starter
    # Evict least-recently-used keys when memory is full
    maxmemoryPolicy: allkeys-lru
    # Only the jctm-platform service may connect
    ipAllowList: []
