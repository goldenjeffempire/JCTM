services:
  #####################################################################
  # JCTM PLATFORM — MAIN WEB SERVICE
  #####################################################################
  - type: web
    name: jctm-platform
    runtime: node
    region: oregon
    # NOTE: `free` instances spin down after ~15 min of inactivity, which causes
    # cold-start latency on the first request. For true always-on / enterprise
    # behaviour upgrade to `starter` (or higher) in the Render dashboard — that
    # alone removes the platform-level cold start. The in-process self-warm
    # pinger and the keep-alive cron below are best-effort mitigations that work
    # on the free tier but cannot fully replace a paid always-on instance.
    plan: free

    autoDeploy: true

    envVars:
      # ---------------------------------------------------------------
      # NODE CONFIG
      # ---------------------------------------------------------------
      - key: NODE_VERSION
        value: "20"

      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      - key: LOG_LEVEL
        value: info

      - key: NODE_OPTIONS
        value: "--enable-source-maps"

      # ---------------------------------------------------------------
      # APPLICATION SECRETS (SET IN RENDER DASHBOARD)
      # ---------------------------------------------------------------
      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: PAYSTACK_SECRET_KEY
        sync: false

      - key: YOUTUBE_API_KEY
        sync: false

      - key: SESSION_SECRET
        sync: false

      - key: ADMIN_TOKEN_SECRET
        sync: false

      - key: ADMIN_PASSPHRASE_GALLERY
        sync: false

      - key: ADMIN_PASSPHRASE_SERMON
        sync: false

      - key: ADMIN_PASSPHRASE_LIVESTREAM
        sync: false

      # ---------------------------------------------------------------
      # PUSH NOTIFICATIONS
      # ---------------------------------------------------------------
      - key: VAPID_PUBLIC_KEY
        sync: false

      - key: VAPID_PRIVATE_KEY
        sync: false

      - key: VAPID_SUBJECT
        value: mailto:info@jctm.org.ng

    ###################################################################
    # BUILD PIPELINE
    ###################################################################
    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      NODE_ENV=production pnpm --filter @workspace/jctm-platform run build &&
      NODE_ENV=production pnpm --filter @workspace/api-server run build &&
      node artifacts/api-server/dist/migrate.mjs

    ###################################################################
    # START SERVER
    ###################################################################
    startCommand: >
      node artifacts/api-server/dist/index.mjs

    ###################################################################
    # HEALTH CHECK
    ###################################################################
    healthCheckPath: /api/health

  #####################################################################
  # KEEP-ALIVE CRON — pings the platform every 10 minutes so the free
  # web service never spins down from inactivity (Always On behaviour).
  #####################################################################
  - type: cron
    name: jctm-keepalive
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: echo "keep-alive ready"
    startCommand: >
      node -e "
        const https = require('https');
        const url = process.env.PLATFORM_URL || 'https://jctm.org.ng';
        // /api/ping is sub-millisecond and avoids running the full health
        // check (DB/Redis/cron) on every keep-alive — much lighter on the box.
        https.get(url + '/api/ping', (res) => {
          console.log('Keep-alive ping:', res.statusCode, new Date().toISOString());
          res.resume();
        }).on('error', (e) => {
          console.error('Keep-alive failed:', e.message);
          process.exit(1);
        });
      "
    envVars:
      - key: PLATFORM_URL
        value: https://jctm.org.ng
