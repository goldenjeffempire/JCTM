kind = "web"
previewPath = "/"
title = "JCTM Digital Sanctuary"
version = "1.0.0"
id = "artifacts/jctm-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/jctm-platform run dev"

[services.production]
publicDir = "artifacts/jctm-platform/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/jctm-platform", "run", "build"]

[services.production.build.env]
PORT = "3000"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
