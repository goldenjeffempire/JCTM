kind = "mobile"
previewPath = "/mobile/"
title = "JCTM Mobile"
version = "1.0.0"
id = "artifacts/jctm-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26034

[services.development]
run = "pnpm --filter @workspace/jctm-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jctm-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/jctm-mobile", "run", "serve" ]

[services.env]
PORT = "26034"
BASE_PATH = "/mobile/"
